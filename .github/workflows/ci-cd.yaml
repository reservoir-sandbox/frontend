name: Frontend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build and Push Docker Image
        run: |
          # VITE_API_URL'yi secrets'tan al
          docker build \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
            -t myregistry/frontend:${{ github.sha }} \
            -t myregistry/frontend:latest \
            .
          
          docker push myregistry/frontend:${{ github.sha }}
          docker push myregistry/frontend:latest
      
      - name: Summary
        run: |
          echo "New image: myregistry/frontend:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY