name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: frontend
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run

      - name: Upload test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-coverage
          path: coverage/
          retention-days: 7

  build-and-push-docker:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=main

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args : |
            VITE_API_URL=/api/v1

      - name: Update image tag in gitops-deployment
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/gitops-deployment
          token: ${{ secrets.PAT_TOKEN }}
          path: gitops-deployment

      - name: Install yq
        run: |
          wget https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Update frontend HelmRelease image tag
        run: |
          yq eval -i '.spec.values.image.repository = "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | .spec.values.image.tag = "${{ github.sha }}"' gitops-deployment/apps/frontend/deployment.yaml
          git -C gitops-deployment config user.name "github-actions"
          git -C gitops-deployment config user.email "github-actions@github.com"
          git -C gitops-deployment add apps/frontend/deployment.yaml
          git -C gitops-deployment commit -m "Update frontend image to ${{ github.sha }}"
          git -C gitops-deployment push
